<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>9.2 库仑定律</title>
    <link rel="stylesheet" href="../styles.css?v=10" />
  </head>
  <body data-asset-base="../" data-ggb-file="assets/9.2.ggb">
    <main class="deck" aria-label="9.2 库仑定律互动课件">
      <header class="topbar">
        <div class="course-mark"><a href="../" title="返回课程首页">9.2 库仑定律</a></div>
        <div class="progress-shell" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
        <div class="page-count" aria-live="polite"><span id="currentPage">1</span>/<span id="totalPages">3</span></div>
      </header>

      <section class="slides" id="slides">
        <article class="slide active" data-slide-title="导入" aria-hidden="false">
          <div class="slide-layout title-layout">
            <div class="title-copy">
              <p class="eyebrow reveal">第九章 静电场及其应用</p>
              <h1 class="reveal">9.2 库仑定律</h1>
              <p class="lead reveal">探究真空中两个静止点电荷之间相互作用力的规律。</p>
            </div>
            <div class="goal-panel reveal">
              <h2>本节目标</h2>
              <ul>
                <li>理解点电荷的理想模型</li>
                <li>掌握库仑定律的内容和适用条件</li>
                <li>会用库仑定律进行简单计算</li>
              </ul>
            </div>
            <button class="prompt-card reveal" type="button" data-flip-card>
              <span>导入问题</span>
              <strong>电荷量和距离怎样影响电荷间的作用力？</strong>
            </button>
          </div>
        </article>

        <article class="slide" data-slide-title="概念" aria-hidden="true">
          <div class="slide-layout concept-layout">
            <div class="section-heading">
              <p class="eyebrow reveal">核心规律</p>
              <h1 class="reveal">库仑力由哪些因素决定？</h1>
            </div>
            <div class="concept-grid">
              <button class="concept-card reveal" type="button" data-highlight>
                <span class="number">01</span><h2>电荷量</h2>
                <p>作用力大小与两点电荷电荷量的乘积成正比。</p>
              </button>
              <button class="concept-card reveal" type="button" data-highlight>
                <span class="number">02</span><h2>距离</h2>
                <p>作用力大小与两点电荷间距离的平方成反比。</p>
              </button>
              <button class="concept-card reveal" type="button" data-highlight>
                <span class="number">03</span><h2>方向</h2>
                <p>作用力沿两点电荷连线，同种相斥、异种相吸。</p>
              </button>
            </div>
            <div class="quiz reveal" data-quiz>
              <div><h2>课堂小测</h2><p>距离变为原来的 2 倍，库仑力变为原来的多少？</p></div>
              <div class="quiz-actions">
                <button type="button" data-answer="false">2 倍</button>
                <button type="button" data-answer="true">1/4</button>
                <button type="button" data-answer="false">1/2</button>
              </div>
              <p class="quiz-feedback" aria-live="polite"></p>
            </div>
          </div>
        </article>

        <article class="slide" data-slide-title="GeoGebra" aria-hidden="true">
          <div class="slide-layout geogebra-layout">
            <div class="section-heading">
              <p class="eyebrow reveal">动态探究</p>
              <h1 class="reveal">库仑力规律演示</h1>
              <p class="lead reveal">拖动 GeoGebra 中的对象，观察相关物理量的变化。</p>
            </div>
            <div class="ggb-stage">
              <div id="ggb-element" class="ggb-element" role="application" aria-label="GeoGebra applet"></div>
              <div class="ggb-fallback" id="ggbFallback" hidden>
                <h2>GeoGebra 暂未加载</h2><p id="ggbFallbackText">请确认 assets/9.2.ggb 已存在。</p>
              </div>
            </div>
          </div>
        </article>
      </section>

      <nav class="controls" aria-label="课件控制">
        <button class="icon-button" id="prevBtn" type="button" aria-label="上一步" title="上一步"><span aria-hidden="true">&#8593;</span></button>
        <button class="icon-button" id="nextBtn" type="button" aria-label="下一步" title="下一步"><span aria-hidden="true">&#8595;</span></button>
      </nav>
    </main>
    <script src="../script.js?v=12"></script>
  </body>
</html>
